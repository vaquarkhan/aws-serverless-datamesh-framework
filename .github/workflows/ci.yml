name: CI



on:

  push:

    branches: [main, develop]

  pull_request:

    branches: [main, develop]



jobs:

  lint-and-test:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version: ["3.12"]



    steps:

      - uses: actions/checkout@v4



      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: ${{ matrix.python-version }}



      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -e ".[dev,rules]"

          pip install veridata-recon



      - name: Version sync check

        run: python scripts/sync_version.py --check



      - name: Ruff

        run: ruff check src tests examples eval scripts



      - name: Ruff format check

        run: ruff format --check src tests examples eval scripts



      - name: Pytest

        run: pytest tests/ -v --tb=short



      - name: Consumer safety benchmark

        run: python eval/validate_then_commit_benchmark.py



      - name: Tutorial walkthrough

        run: python examples/tutorials/walkthrough.py

      - name: Local PVDM demo
        run: python -m serverless_data_mesh.cli demo --json

      - name: Verification gate demo
        run: python examples/tutorials/verification_gate_demo.py --json



      - name: Build package
        run: pip install build && python -m build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform validate prod
        run: |
          terraform -chdir=infrastructure/terraform/environments/prod init -backend=false
          terraform -chdir=infrastructure/terraform/environments/prod validate

      - name: Terraform validate dev
        run: |
          terraform -chdir=infrastructure/terraform/environments/dev init -backend=false
          terraform -chdir=infrastructure/terraform/environments/dev validate

      - name: Check Terraform files for UTF-8 BOM
        run: python scripts/check_terraform_encoding.py

      - name: Local benchmark
        run: python benchmarks/run_local_benchmark.py

      - name: Generate mesh fixture for Terraform validate
        run: |
          serverless-data-mesh apply \
            --contract examples/medallion-e2e/northstar.mesh.yaml \
            --output infrastructure/terraform/fixtures/generated-mesh

      - name: Terraform validate medallion
        run: |
          terraform -chdir=infrastructure/terraform/environments/medallion init -backend=false
          terraform -chdir=infrastructure/terraform/environments/medallion validate \
            -var="mesh_generated_path=../../fixtures/generated-mesh" \
            -var="layer_lambda_manifest_path=../../fixtures/generated-mesh/layer_lambda.manifest.json" \
            -var="checkpoint_bucket_name=fixture-checkpoints" \
            -var="proof_bucket_name=fixture-proofs" \
            -var="lakehouse_bucket_name=fixture-lakehouse" \
            -var="name_prefix=sdm-fixture"
